<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula Student Acceleration Simulation — Development Logbook</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Source+Sans+Pro:wght@400;600&display=swap');
        
        :root {
            --text-color: #2c2c2c;
            --heading-color: #1a1a1a;
            --accent-color: #8B0000;
            --border-color: #ddd;
            --bg-light: #fafafa;
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 17px;
            line-height: 1.7;
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fff;
        }
        
        h1 {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--heading-color);
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
        }
        
        .entry { margin-bottom: 45px; page-break-inside: avoid; }
        
        .date {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        
        .entry-title {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--heading-color);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        
        p { margin: 0 0 16px 0; text-align: justify; hyphens: auto; }
        
        pre {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background: var(--bg-light);
            padding: 12px 16px;
            margin: 16px 0;
            border-left: 3px solid var(--accent-color);
            overflow-x: auto;
            white-space: pre-wrap;
        }
        
        pre.mermaid-container {
            border-left: none;
            padding: 20px;
            border: 1px solid var(--border-color);
            text-align: center;
            background: var(--bg-light);
        }
        
        code {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            background: var(--bg-light);
            padding: 2px 6px;
        }
        
        pre code {
            background: none;
            padding: 0;
        }
        
        ul, ol { margin: 16px 0; padding-left: 24px; }
        li { margin-bottom: 8px; }
        
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        hr {
            border: none;
            text-align: center;
            margin: 50px 0;
            color: var(--accent-color);
        }
        hr::before {
            content: "• • •";
            letter-spacing: 8px;
        }
        
        #content h2 {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 45px;
            margin-bottom: 4px;
        }
        
        #content h3 {
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--heading-color);
            margin-top: 0;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        @media print {
            body { font-size: 11pt; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<h1>Formula Student Acceleration Simulation<br>Development Logbook</h1>

<div id="content">
    <div class="loading">Loading...</div>
</div>

<script>
    // Initialize mermaid
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'neutral',
        flowchart: { useMaxWidth: true, htmlLabels: true }
    });

    async function loadLogbook() {
        try {
            const response = await fetch('../LOGBOOK.md');
            if (!response.ok) throw new Error('Failed to load LOGBOOK.md');
            let markdown = await response.text();
            
            // Remove the title line
            markdown = markdown.replace(/^Formula Student Acceleration Simulation.*?\n+/, '');
            
            // Convert date headers to h2 and titles to h3
            markdown = markdown.replace(
                /\n\n(\d{1,2}(?:st|nd|rd|th) (?:November|December|January) \d{4})\n([^\n]+)\n/g,
                '\n\n## $1\n### $2\n'
            );
            
            // Extract mermaid blocks before parsing
            const mermaidBlocks = [];
            markdown = markdown.replace(/```mermaid\n([\s\S]*?)```/g, (match, code) => {
                const id = `mermaid-placeholder-${mermaidBlocks.length}`;
                mermaidBlocks.push({ id, code: code.trim() });
                return `<pre class="mermaid-container" id="${id}"></pre>`;
            });
            
            // Configure marked
            marked.setOptions({
                breaks: false,
                gfm: true
            });
            
            // Render markdown
            let html = marked.parse(markdown);
            
            // Display
            document.getElementById('content').innerHTML = html;
            
            // Render mermaid diagrams
            for (const block of mermaidBlocks) {
                const container = document.getElementById(block.id);
                if (container) {
                    try {
                        const { svg } = await mermaid.render(block.id + '-svg', block.code);
                        container.innerHTML = svg;
                    } catch (err) {
                        container.innerHTML = `<pre style="color: red; text-align: left;">Mermaid error: ${err.message}\n\n${block.code}</pre>`;
                    }
                }
            }
            
        } catch (error) {
            document.getElementById('content').innerHTML = `
                <div class="loading" style="color: red;">
                    Error loading logbook: ${error.message}<br><br>
                    Make sure you're running a local server:<br>
                    <code>cd /Users/harryemes/Documents/3YP_Code && python -m http.server 8000</code><br><br>
                    Then open: <a href="http://localhost:8000/figures/LOGBOOK_LIVE.html">http://localhost:8000/figures/LOGBOOK_LIVE.html</a>
                </div>
            `;
        }
    }
    
    loadLogbook();
</script>

</body>
</html>
